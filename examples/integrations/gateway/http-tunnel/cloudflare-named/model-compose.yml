controller:
  adapter:
    type: http-server
    base_path: /api
    port: 8080
  webui:
    port: 8081

gateway:
  type: http-tunnel
  driver: cloudflare
  token: ${env.CLOUDFLARE_TUNNEL_TOKEN}
  hostname: app.example.com
  port:
    - 8090

listener:
  type: http-callback
  host: 0.0.0.0
  port: 8090
  path: /callback
  identify_by: ${body.task_id}
  result: ${body.result}

workflow:
  title: Cloudflare Named Tunnel Gateway Example
  description: Demonstrates using a Cloudflare Named Tunnel with a fixed domain for production use
  job:
    input: ${input}
    output: ${output}

component:
  type: http-server
  start: [ uvicorn, server:app, --reload, --port, "9000" ]
  port: 9000
  action:
    method: POST
    path: /process
    headers:
      Content-Type: application/json
    body:
      data: ${input.data}
      callback_url: ${gateway:8090.public_url}/callback
      task_id: ${context.run_id}
    completion:
      type: callback
      wait_for: ${context.run_id}
    output:
      task_id: ${response.task_id}
      result: ${result as json}
