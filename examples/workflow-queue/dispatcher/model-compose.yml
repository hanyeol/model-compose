controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  queue:
    driver: redis
    host: localhost
    port: 6379
    name: my-queue
  webui:
    driver: gradio
    port: 8081

workflow:
  title: Echo via Queue
  description: Dispatches a task to a remote worker through Redis queue.
  job:
    type: component

component:
  type: workflow
  action:
    workflow: echo
    input:
      text: ${input.text as text}
    output:
      text: ${output.text as text}
