controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflows:
  - id: convert
    title: Video Converter
    description: Convert a video file to another format using ffmpeg
    job:
      component: converter
      input:
        video: ${input.video as video}
        format: ${input.format as select/mp4,webm,avi,mkv,mov,flv | mp4}
        codec: ${input.codec as select/libx264,libx265,vp9,av1,copy | libx264}
        audio_codec: ${input.audio_codec as select/aac,opus,mp3,flac,copy | aac}
        bitrate: ${input.bitrate as select/512k,1M,2M,5M,10M | 2M}
        resolution: ${input.resolution as select/1920x1080,1280x720,854x480,3840x2160 | 1920x1080}
        fps: ${input.fps as select/24,30,60 | 30}
      output:
        video: ${output.path as video;path}

components:
  - id: converter
    type: video-converter
    action:
      video: ${input.video}
      format: ${input.format}
      codec: ${input.codec}
      audio_codec: ${input.audio_codec}
      bitrate: ${input.bitrate}
      resolution: ${input.resolution}
      fps: ${input.fps}
