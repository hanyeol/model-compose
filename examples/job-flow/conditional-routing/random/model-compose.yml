controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflows:
  - id: uniform-routing
    title: Uniform Random Routing
    description: |
      Routes each run to one of three variants with equal probability.
      Demonstrates the `random-router` job in `uniform` mode.
    jobs:
      - id: pick-variant
        type: random-router
        mode: uniform
        routings:
          - to: variant-a
          - to: variant-b
          - to: variant-c

      - id: variant-a
        component: render-variant
        input:
          variant: A
        output: ${output}

      - id: variant-b
        component: render-variant
        input:
          variant: B
        output: ${output}

      - id: variant-c
        component: render-variant
        input:
          variant: C
        output: ${output}

  - id: weighted-routing
    title: Weighted Random Routing
    description: |
      Routes each run to one of three variants with the configured weights.
      Demonstrates the `random-router` job in `weighted` mode. Weights are
      relative — they do not need to sum to 1.
    jobs:
      - id: pick-variant
        type: random-router
        mode: weighted
        routings:
          - weight: 7
            to: variant-control
          - weight: 2
            to: variant-experiment
          - weight: 1
            to: variant-canary

      - id: variant-control
        component: render-variant
        input:
          variant: control
        output: ${output}

      - id: variant-experiment
        component: render-variant
        input:
          variant: experiment
        output: ${output}

      - id: variant-canary
        component: render-variant
        input:
          variant: canary
        output: ${output}

components:
  - id: render-variant
    type: shell
    action:
      command: [ "echo", "Selected variant: ${input.variant}" ]
      output:
        variant: ${input.variant}
        rendered: ${result.stdout}
