controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

systems:
  - id: chrome-with-novnc
    type: docker
    build:
      context: .
    image: chrome-with-novnc
    ports:
      - "9222:9223"
      - "6080:6080"
    shm_size: "2gb"
    wait: true
    wait_timeout: 60s

workflows:
  - id: main
    default: true
    title: DESIGN.md Generator
    description: >
      Analyze a website's design system and generate a comprehensive DESIGN.md document.
      Provide a URL and select an AI model.
    jobs:
      - id: analyze-page-structure
        component:
          type: workflow
          action:
            workflow: analyze-page-structure
        input:
          url: ${input.url}

      - id: analyze-design-tokens
        component:
          type: workflow
          action:
            workflow: analyze-design-tokens
        depends_on: [ analyze-page-structure ]

      - id: extract-css-properties
        component:
          type: workflow
          action:
            workflow: extract-css-properties
        input:
          instructions: Extract all design token custom properties from the page.
        depends_on: [ analyze-page-structure ]

      - id: inspect-component-styles
        component:
          type: workflow
          action:
            workflow: inspect-component-styles
        input:
          instructions: >
            Extract computed styles for these UI components. For each component,
            find ALL visual variants (e.g., primary/secondary/ghost buttons,
            standard/featured cards) by examining different class names.

            Components to inspect:
            1. Navigation (nav, header, [role=navigation]) — link styles, active state, logo area
            2. Hero section ([class*=hero], section:first-of-type) — heading, subheading, CTA buttons
            3. Buttons (button, a[class*=btn], [class*=button], [class*=cta]) — ALL color/size variants
            4. Cards ([class*=card], [class*=tile], article) — standard and featured variants
            5. Inputs (input, textarea, select) — default and focus states
            6. Footer (footer) — background, text, link colors
            7. Badges/chips ([class*=badge], [class*=tag], [class*=chip], [class*=label]) — if present
            8. Pricing/feature tables ([class*=price], [class*=plan], [class*=tier]) — if present

            For buttons and cards, use extract_page_html first to identify distinct
            class-based variants, then extract_computed_styles for each variant separately.
        depends_on: [ analyze-page-structure ]

      - id: synthesize-design-md
        component:
          type: workflow
          action:
            workflow: synthesize-design-md
        input:
          analysis: |
            ## Page Structure
            ${jobs.analyze-page-structure.output}

            ## Design Tokens
            ${jobs.analyze-design-tokens.output}

            ## CSS Custom Properties
            ${jobs.extract-css-properties.output}

            ## Component Styles
            ${jobs.inspect-component-styles.output}
        output:
          design_md: ${output as text}
        depends_on: [ analyze-design-tokens, extract-css-properties, inspect-component-styles ]

  # ---------------------------------------------------------------------------
  # Analysis workflows (tools for design-analyzer agent)
  # ---------------------------------------------------------------------------

  - id: analyze-page-structure
    #private: true
    name: analyze_page_structure
    description: >
      Navigate to a URL, wait for fonts, then extract page structure,
      head HTML (link/style tags), and font source declarations.
      Returns a JSON object with keys: structure, head_html, font_sources.
    jobs:
      - id: navigate
        component: browser
        action: navigate
        input:
          url: ${input.url @(description The full URL to analyze, e.g. https://stripe.com)}
          wait_until: networkidle
      - id: load-fonts
        component: browser
        action: evaluate
        input:
          expression: >
            (async () => { await document.fonts.ready; return 'ready'; })()
      - id: scroll-to-reveal
        component: browser
        action: evaluate
        input:
          expression: >
            (async () => {
              const SCROLL_STEP = 600;
              const MAX_SCROLLS = 50;
              const SETTLE_TIMEOUT = 400;
              const MAX_SETTLE = 2000;

              function waitForDomSettle() {
                return new Promise(resolve => {
                  let changed = false;
                  let timer = null;
                  const start = Date.now();
                  const observer = new MutationObserver(() => {
                    changed = true;
                    clearTimeout(timer);
                    if (Date.now() - start > MAX_SETTLE) { observer.disconnect(); resolve(true); return; }
                    timer = setTimeout(() => { observer.disconnect(); resolve(true); }, SETTLE_TIMEOUT);
                  });
                  observer.observe(document.body, { childList: true, subtree: true });
                  timer = setTimeout(() => { observer.disconnect(); resolve(changed); }, SETTLE_TIMEOUT);
                });
              }

              let scrolls = 0;
              while (scrolls < MAX_SCROLLS) {
                const beforeY = window.scrollY;
                window.scrollBy(0, SCROLL_STEP);
                const domChanged = await waitForDomSettle();
                const stuck = (window.scrollY === beforeY);
                if (stuck && !domChanged) break;
                if (stuck && domChanged) {
                  window.scrollBy(0, SCROLL_STEP);
                  await waitForDomSettle();
                  if (window.scrollY === beforeY) break;
                }
                scrolls++;
              }
              window.scrollTo(0, 0);
              await waitForDomSettle();
              return scrolls + ' scrolls completed';
            })()
        depends_on: [ load-fonts ]
      - id: extract-structure
        component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const SECTION_TAGS = ['header', 'nav', 'main', 'section', 'article', 'aside', 'footer', 'div'];
              const HEADING_SELECTOR = 'h1,h2,h3,h4';
              const MAX_DEPTH = 4;
              const MAX_SECTIONS = 50;
              const MAX_CLASSES = 3;
              const HEADING_PREVIEW_LENGTH = 80;

              const sections = [];

              function walk(el, depth) {
                if (depth > MAX_DEPTH) return;

                const tag = el.tagName.toLowerCase();
                const isSectionTag = SECTION_TAGS.includes(tag);
                const role = el.getAttribute('role');
                const id = el.id;
                const classes = (el.className && typeof el.className === 'string')
                  ? el.className.split(/\s+/).slice(0, MAX_CLASSES).join(' ')
                  : '';

                if (isSectionTag && (role || id || classes || depth < 2)) {
                  const heading = el.querySelector(HEADING_SELECTOR);
                  sections.push({
                    tag,
                    depth,
                    id: id || undefined,
                    classes: classes || undefined,
                    role: role || undefined,
                    heading: heading ? heading.textContent.trim().slice(0, HEADING_PREVIEW_LENGTH) : undefined,
                    childCount: el.children.length
                  });
                }

                for (const child of el.children) {
                  walk(child, depth + 1);
                }
              }

              walk(document.body, 0);

              const meta = {
                title: document.title,
                themeColor: document.querySelector('meta[name=theme-color]')?.content || undefined,
                colorScheme: getComputedStyle(document.documentElement).colorScheme || undefined,
                bodyBg: getComputedStyle(document.body).backgroundColor,
                bodyColor: getComputedStyle(document.body).color,
                htmlClasses: (document.documentElement.className || '').split(/\s+/).slice(0, 5).join(' ') || undefined
              };

              return JSON.stringify({ sections: sections.slice(0, MAX_SECTIONS), meta });
            })()
        depends_on: [ scroll-to-reveal ]
      - id: extract-head-html
        component: browser
        action: extract-html
        input:
          selector: "head > link, head > style"
        depends_on: [ scroll-to-reveal ]
      - id: extract-fonts
        component: browser
        action: evaluate
        input:
          expression: >
            (async () => {
              const SRC_PREVIEW_LENGTH = 300;
              const result = { fontFaceRules: [], loadedFonts: [] };

              function cleanFamily(name) {
                return name.replace(/['"]/g, '').trim();
              }

              for (const sheet of document.styleSheets) {
                try {
                  for (const rule of sheet.cssRules) {
                    if (rule instanceof CSSFontFaceRule) {
                      const style = rule.style;
                      result.fontFaceRules.push({
                        fontFamily: cleanFamily(style.getPropertyValue('font-family')),
                        src: style.getPropertyValue('src').slice(0, SRC_PREVIEW_LENGTH),
                        fontWeight: style.getPropertyValue('font-weight') || undefined,
                        fontStyle: style.getPropertyValue('font-style') || undefined
                      });
                    }
                  }
                } catch (e) {
                  /* CORS: skip inaccessible sheet */
                }
              }

              try {
                await document.fonts.ready;
                const seen = new Set();
                for (const font of document.fonts) {
                  if (font.status !== 'loaded') continue;
                  const key = cleanFamily(font.family) + '|' + font.weight + '|' + font.style;
                  if (seen.has(key)) continue;
                  seen.add(key);
                  result.loadedFonts.push({
                    family: cleanFamily(font.family),
                    weight: font.weight,
                    style: font.style
                  });
                }
              } catch (e) {
                /* fonts API unavailable */
              }

              return JSON.stringify(result);
            })()
        depends_on: [ scroll-to-reveal ]
        output:
          structure: ${jobs.extract-structure.output}
          head_html: ${jobs.extract-head-html.output}
          font_sources: ${output}

  - id: analyze-design-tokens
    #private: true
    name: analyze_design_tokens
    description: >
      Extract all design tokens from the current page: color palette (with alpha preservation),
      typography styles, and spacing/border-radius values.
      Returns a JSON object with keys: colors, typography, spacing.
    jobs:
      - id: extract-colors
        component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const MAX_BACKGROUNDS = 20;
              const MAX_TEXT_COLORS = 20;
              const MAX_BORDER_COLORS = 15;
              const MAX_SHADOWS = 10;
              const SKIP_TAGS = new Set(['html', 'head', 'meta', 'link', 'script', 'style', 'title', 'br', 'hr', 'noscript', 'template']);

              function parseColor(raw) {
                if (!raw || raw === 'transparent' || raw === 'rgba(0, 0, 0, 0)') return null;
                const match = raw.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
                if (!match) return raw;
                const [, r, g, b, a] = match;
                const hex = '#' + [r, g, b].map(c => parseInt(c).toString(16).padStart(2, '0')).join('');
                const alpha = a !== undefined ? parseFloat(a) : 1;
                return alpha < 1 ? `rgba(${r}, ${g}, ${b}, ${alpha})` : hex;
              }

              function isVisible(el) {
                if (SKIP_TAGS.has(el.tagName.toLowerCase())) return false;
                if (!el.offsetParent && el.tagName.toLowerCase() !== 'body') return false;
                return true;
              }

              function describeEl(el) {
                const tag = el.tagName.toLowerCase();
                const cls = (el.className && typeof el.className === 'string')
                  ? '.' + el.className.split(/\s+/).slice(0, 2).join('.')
                  : '';
                const role = el.getAttribute('role');
                return tag + cls + (role ? '[' + role + ']' : '');
              }

              const bgMap = {};
              const textMap = {};
              const borderMap = {};
              const shadowMap = {};

              for (const el of document.querySelectorAll('*')) {
                if (!isVisible(el)) continue;
                const computed = getComputedStyle(el);
                const bg = parseColor(computed.backgroundColor);
                const text = parseColor(computed.color);
                const border = parseColor(computed.borderColor);
                const shadow = computed.boxShadow;
                const desc = describeEl(el);

                if (bg) {
                  if (!bgMap[bg]) bgMap[bg] = { value: bg, count: 0, elements: [] };
                  bgMap[bg].count++;
                  if (bgMap[bg].elements.length < 3) bgMap[bg].elements.push(desc);
                }
                if (text) {
                  if (!textMap[text]) textMap[text] = { value: text, count: 0, elements: [] };
                  textMap[text].count++;
                  if (textMap[text].elements.length < 3) textMap[text].elements.push(desc);
                }
                if (border && border !== bg) {
                  if (!borderMap[border]) borderMap[border] = { value: border, count: 0, elements: [] };
                  borderMap[border].count++;
                  if (borderMap[border].elements.length < 3) borderMap[border].elements.push(desc);
                }
                if (shadow && shadow !== 'none') {
                  if (!shadowMap[shadow]) shadowMap[shadow] = { value: shadow, count: 0, elements: [] };
                  shadowMap[shadow].count++;
                  if (shadowMap[shadow].elements.length < 3) shadowMap[shadow].elements.push(desc);
                }
              }

              const sortByCount = (obj, max) =>
                Object.values(obj).sort((a, b) => b.count - a.count).slice(0, max);

              return JSON.stringify({
                backgrounds: sortByCount(bgMap, MAX_BACKGROUNDS),
                textColors: sortByCount(textMap, MAX_TEXT_COLORS),
                borderColors: sortByCount(borderMap, MAX_BORDER_COLORS),
                shadows: sortByCount(shadowMap, MAX_SHADOWS)
              });
            })()
      - id: extract-typography
        component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const STYLE_KEYS = ['fontSize', 'fontWeight', 'lineHeight', 'letterSpacing', 'textTransform', 'color'];
              const LANDMARK_TAGS = new Set(['header', 'nav', 'main', 'section', 'article', 'aside', 'footer']);
              const SKIP_TAGS = new Set(['script', 'style', 'noscript', 'template', 'svg', 'path', 'iframe']);
              const WEIGHT_SUFFIXES = ['Thin', 'ExtraLight', 'UltraLight', 'Light', 'Regular', 'Medium', 'SemiBold', 'DemiBold', 'Bold', 'ExtraBold', 'UltraBold', 'Black', 'Heavy'];
              const GENERIC_FAMILIES = new Set(['serif', 'sans-serif', 'monospace', 'cursive', 'fantasy', 'system-ui', 'ui-monospace', 'ui-serif', 'ui-sans-serif', 'ui-rounded']);
              const MAX_RESULTS = 50;
              const TEXT_PREVIEW_LENGTH = 60;
              const MIN_TEXT_LENGTH = 2;

              function resolveFontFamily(rawFamily) {
                var first = rawFamily.split(',')[0].trim().replace(/['"]/g, '');
                if (GENERIC_FAMILIES.has(first)) return { family: first, variant: null };
                var clean = first.replace(/^__/, '').replace(/_[a-f0-9]{4,}$/i, '');
                var variant = null;
                for (var i = 0; i < WEIGHT_SUFFIXES.length; i++) {
                  var sfx = WEIGHT_SUFFIXES[i];
                  if (clean.length > sfx.length && clean.endsWith(sfx) && clean[clean.length - sfx.length - 1] === '-') {
                    variant = sfx.toLowerCase();
                    clean = clean.substring(0, clean.length - sfx.length - 1);
                    break;
                  }
                }
                var spaced = clean.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
                return { family: spaced, variant: variant };
              }

              function assignTierName(entry, usedNames) {
                var size = parseFloat(entry.fontSize) || 0;
                var isMono = GENERIC_FAMILIES.has(entry.fontFamily) || entry.fontFamily === 'ui-monospace';
                var base;
                if (isMono) { base = 'code'; }
                else if (size >= 48) { base = 'display'; }
                else if (size >= 32) { base = 'title'; }
                else if (size >= 20) { base = 'body'; }
                else if (size >= 14) { base = 'label'; }
                else { base = 'caption'; }
                var suffix = entry.fontVariant && entry.fontVariant !== 'regular' ? '-' + entry.fontVariant : '';
                var name = base + suffix;
                if (usedNames[name]) { name = base + '-' + Math.round(size) + (suffix || ''); }
                var counter = 2;
                var candidate = name;
                while (usedNames[candidate]) { candidate = name + '-' + counter; counter++; }
                usedNames[candidate] = true;
                return candidate;
              }

              function getLandmark(el) {
                let cur = el.parentElement;
                while (cur && cur !== document.body) {
                  if (LANDMARK_TAGS.has(cur.tagName.toLowerCase())) return cur.tagName.toLowerCase();
                  cur = cur.parentElement;
                }
                return 'body';
              }

              function hasDirectText(el) {
                for (const node of el.childNodes) {
                  if (node.nodeType === 3 && node.textContent.trim().length >= MIN_TEXT_LENGTH) return true;
                }
                return false;
              }

              function isHidden(el) {
                const s = getComputedStyle(el);
                return s.display === 'none' || s.visibility === 'hidden' || s.opacity === '0';
              }

              const seen = new Set();
              const entries = [];

              const walker = document.createTreeWalker(
                document.body,
                NodeFilter.SHOW_ELEMENT,
                {
                  acceptNode: function(el) {
                    const tag = el.tagName.toLowerCase();
                    if (SKIP_TAGS.has(tag)) return NodeFilter.FILTER_REJECT;
                    if (isHidden(el)) return NodeFilter.FILTER_REJECT;
                    if (hasDirectText(el)) return NodeFilter.FILTER_ACCEPT;
                    return NodeFilter.FILTER_SKIP;
                  }
                }
              );

              let el;
              while (el = walker.nextNode()) {
                const text = (el.textContent || '').trim();
                if (!text || text.length < MIN_TEXT_LENGTH) continue;

                const computed = getComputedStyle(el);
                const landmark = getLandmark(el);
                const resolved = resolveFontFamily(computed.fontFamily);
                const key = [resolved.family, computed.fontSize, computed.fontWeight, computed.lineHeight, computed.letterSpacing].join('|');
                if (seen.has(key)) continue;
                seen.add(key);

                const tag = el.tagName.toLowerCase();
                const entry = {
                  tag,
                  text: text.slice(0, TEXT_PREVIEW_LENGTH),
                  context: landmark,
                  fontFamily: resolved.family,
                  fontVariant: resolved.variant,
                  role: el.closest('[role]')?.getAttribute('role') || undefined
                };
                for (const prop of STYLE_KEYS) {
                  entry[prop] = computed[prop];
                }
                entries.push(entry);
              }

              var usedNames = {};
              var tiers = entries.slice(0, MAX_RESULTS).map(function(e) {
                e.tierName = assignTierName(e, usedNames);
                return e;
              });

              var yaml = tiers.map(function(t) {
                var lines = [
                  '  ' + t.tierName + ':',
                  '    fontFamily: "' + t.fontFamily + '"',
                  '    fontSize: "' + t.fontSize + '"',
                  '    fontWeight: ' + t.fontWeight,
                  '    lineHeight: "' + t.lineHeight + '"',
                  '    letterSpacing: "' + t.letterSpacing + '"'
                ];
                if (t.fontVariant && t.fontVariant !== 'regular') {
                  lines.push('    # variant: ' + t.fontVariant + ' | tag: ' + t.tag + ' | "' + t.text.slice(0, 30) + '"');
                } else {
                  lines.push('    # tag: ' + t.tag + ' | "' + t.text.slice(0, 30) + '"');
                }
                return lines.join('\n');
              }).join('\n');

              return 'typography:\n' + yaml;
            })()
      - id: extract-spacing
        component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const SPACING_PROPS = [
                'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft',
                'marginTop', 'marginRight', 'marginBottom', 'marginLeft', 'gap'
              ];
              const SKIP_VALUES = new Set(['0px', 'normal', '']);

              const spacings = new Set();
              const radii = new Set();

              function toNumber(s) {
                return parseFloat(s) || 0;
              }

              for (const el of document.querySelectorAll('*')) {
                const computed = getComputedStyle(el);

                for (const prop of SPACING_PROPS) {
                  const value = computed[prop];
                  if (value && !SKIP_VALUES.has(value)) {
                    spacings.add(value);
                  }
                }

                if (computed.borderRadius && computed.borderRadius !== '0px') {
                  radii.add(computed.borderRadius);
                }
              }

              return JSON.stringify({
                spacings: [...spacings].sort((a, b) => toNumber(a) - toNumber(b)),
                radii: [...radii].sort((a, b) => toNumber(a) - toNumber(b))
              });
            })()
        output:
          colors: ${jobs.extract-colors.output}
          typography: ${jobs.extract-typography.output}
          spacing: ${output}

  - id: extract-css-properties
    #private: true
    name: extract_css_properties
    description: >
      Use an AI agent to dynamically analyze the page's CSS architecture
      and extract meaningful CSS custom properties (design tokens).
      The agent adapts its extraction strategy based on the CSS framework detected
      (Tailwind, vanilla CSS, CSS-in-JS, etc.).
      An LLM then filters out framework noise and returns only design tokens.
      Returns a JSON object of CSS custom properties grouped by selector.
    jobs:
      - id: extract-tokens
        component: css-property-extractor
        input:
          instructions: ${input.instructions @(description Instructions for CSS property extraction, e.g. "Extract all design token custom properties from the page")}
        output: ${output[-1].content as text}

      - id: filter-tokens
        component: gpt-4o
        input:
          messages:
            - role: system
              content: |
                You are a CSS design token expert. You receive raw CSS custom properties
                extracted from a web page. Your job is to filter out framework/library noise
                and return ONLY meaningful design tokens.

                # REMOVE these categories (framework internals, not design tokens):
                - Tailwind internals: --tw-*, --tw-ring-*, --tw-shadow-*, etc.
                - CSS Module hashes: --_*, --module-*, randomly hashed names
                - Third-party library variables: --toastify-*, --cc-*, --swiper-*, --slick-*,
                  --react-*, --mui-*, --chakra-*, --mantine-*, --radix-*, --cmdk-*
                - Browser/polyfill internals: --webkit-*, --moz-*
                - Any variable whose name clearly belongs to a specific library, not the site's design system

                # KEEP these (actual design tokens):
                - Color tokens: --color-*, --background, --foreground, --primary, --secondary, --accent, --muted, --destructive, --border, --ring, --card, --popover, etc.
                - Typography tokens: --font-*, --text-*, --letter-*, --line-*
                - Spacing/sizing: --spacing-*, --size-*, --gap-*, --padding-*, --margin-*, --radius-*, --rounded-*
                - Shadow/effect tokens: --shadow-* (but not --tw-shadow-*)
                - Layout tokens: --sidebar-*, --header-*, --container-*, --nav-*
                - Theme tokens from :root, .dark, [data-theme], html, body selectors
                - Any variable that represents a design decision (color, size, font, etc.)

                # OUTPUT FORMAT
                Return a JSON object grouped by selector, identical structure to the input
                but with noise removed. Preserve exact property names and values.
                Output ONLY raw JSON — no code fences, no ```json markers, no explanation.
                The output must be valid JSON that can be parsed directly.
            - role: user
              content: |
                Filter the following extracted CSS custom properties. Remove framework noise, keep only design tokens.

                ${jobs.extract-tokens.output}
        depends_on: [ extract-tokens ]
        output: ${output.content as text}

  - id: inspect-component-styles
    #private: true
    name: inspect_component_styles
    description: >
      Given natural-language instructions about which UI components to inspect,
      use an AI agent to dynamically choose CSS selectors and extract computed styles.
      Returns a structured JSON summary of all extracted component styles.
    job:
      component: component-inspector
      input:
        instructions: ${input.instructions @(description Natural-language instructions describing which components to inspect, e.g. "Extract styles for the hero section, navigation bar, pricing cards, and footer")}
      output: ${output[-1].content as text}

  - id: synthesize-design-md
    #private: true
    name: synthesize_design_md
    description: >
      Generate a complete DESIGN.md document from extracted design data
      in a single LLM call. Input must be a string containing all extracted
      structure, tokens, and component style data.
    job:
      component: gpt-4o
      input:
        messages:
          - role: system
            content: |
              You are an expert design system analyst. Your job is to produce a comprehensive
              DESIGN.md document from website analysis data.

              # OUTPUT FORMAT

              Your output MUST be a complete DESIGN.md document with YAML front matter followed by Markdown prose.
              Use exact CSS values (hex codes, px values, font stacks) from the provided data — never approximate or fabricate.

              ## Front Matter

              The document starts with a YAML front matter block delimited by `---`.
              This block defines all design tokens as structured data.

              ```yaml
              ---
              version: alpha
              name: "<page title or brand name from data>"
              description: "<1-2 sentences: dominant surface color, accent color, font families, what makes it visually distinct>"

              colors:
                # Assign semantic names based on OBSERVED USAGE with evidence:
                #   primary — the most frequently used accent/brand color (cite element count)
                #   secondary — the second most used accent color
                #   surface — the dominant background color (highest count in backgrounds)
                #   on-surface — the main text color on that surface
                #   muted — low-contrast text color if observed
                #   border — most common border color
                #   error/success/warning — only if actually present in the data
                #
                # NAMING RULES:
                # - Every color MUST come from the extracted data (hex or converted rgba).
                # - The semantic name MUST be justified by the element context.
                #   e.g., if "#FF6B00" appears on buttons and CTAs → "primary" is justified.
                #   e.g., if "#1A1A2E" is the body/section background → "surface" is justified.
                # - Do NOT invent colors. Do NOT add colors "for completeness."
                # - Use the element descriptions from the data to determine roles.
                # - Add alpha variants only if the extracted data contains rgba values.

              typography:
                # The Design Tokens data contains a pre-formatted "typography:" YAML block.
                # Copy it VERBATIM into the front matter. Do NOT modify, reorder, skip, or
                # merge any tiers. Include every single tier exactly as provided.

              rounded:
                # Map extracted border-radius values to t-shirt sizes.
                # Use only values found in the spacing/radii extraction data.
                # Omit sizes that have no corresponding extracted value.

              spacing:
                # Map extracted spacing values to t-shirt sizes.
                # Use only values found in the spacing extraction data.
                # Omit sizes that have no corresponding extracted value.

              components:
                # Each entry = one observed component variant from Component Styles data.
                # Key format: <type>-<variant> (e.g., button-primary, card-standard)
                # Include ONLY components that appear in the extracted Component Styles data.
                #
                # Properties reference front matter tokens with {category.name} syntax.
                # Use exact extracted values for properties not mappable to tokens.
                # Do NOT add components that were not extracted.
                # Do NOT invent padding, height, or size values.
              ---
              ```

              ## Prose Sections

              After the front matter, write Markdown prose with these sections.
              Write in natural language — describe the design system as a designer would explain it to a colleague.
              Do NOT use `{token.ref}` syntax in prose. Use actual values (hex codes, px, font names) directly.

              ```markdown
              # Brand Name

              ## Overview
              [1-2 paragraphs. Describe ONLY observable visual characteristics: dominant colors,
              font choices, spacing density, use of shadows or flatness, contrast levels.
              Do NOT describe brand intent, target audience, industry, or design philosophy.
              GOOD: "The system pairs a dark charcoal surface (#1A1A2E) with bright orange (#FF6B00) accents,
              set in Noto Sans KR at generous line heights."
              BAD: "A sophisticated fintech aesthetic targeting tech-savvy professionals."]

              ## Colors
              [One entry per color token. Format:
              - **Token Name (#hex):** Which extracted elements use this color (cite tag/class from data).
              Do NOT describe "mood" or "feeling" of colors — describe where they appear.]

              ## Typography
              [1-2 paragraphs. State which font families are used (resolved names from font source data),
              how many weight variants appear, and the size range from the extracted tiers.
              Describe the observable hierarchy — which sizes go to which element types.]

              ## Layout
              [1 paragraph. Describe the spacing values observed and where they cluster.
              Mention specific gap/padding/margin values from the data.]

              ## Elevation & Depth
              [1 paragraph. Describe observed shadow values and which elements use them.
              If no shadows were extracted, state that the system is flat.]

              ## Shapes
              [1 paragraph. Describe the border-radius values observed and which elements use which radii.]

              ## Components
              [1-3 paragraphs. Describe the key UI components from the Component Styles data.
              Include exact extracted values (padding, colors, border-radius) inline.
              Only describe components that were actually extracted.]

              ## Do's and Don'ts
              [5-8 Do bullets and 5-8 Don't bullets.
              Each bullet MUST reference a specific value from the extracted data.
              GOOD: "Do use 8px border-radius for cards, matching the extracted card styles."
              BAD: "Do maintain visual consistency across touchpoints."]
              ```

              # WRITING STYLE

              - Be **authoritative and declarative**. The system "uses" or "pairs", never "should" or "would."
              - Write **concise, dense prose** — every sentence carries observable information.
              - Use **actual values** (hex, px, font names) directly in prose. No `{token.ref}` syntax in body text.
              - Front matter `components:` block may reference other tokens with `{category.name}` syntax.

              # CRITICAL RULES

              1. **Data fidelity**: Every hex code, px value, font name, and dimension MUST trace back
                 to the provided extraction data. If you cannot point to the source entry, do not include it.
              2. **No fabrication**: Do NOT invent colors, typography tiers, or component variants
                 that are absent from the data. Fewer accurate tokens are better than many guessed ones.
              3. **Font name resolution**: The typography data may contain raw CSS font-family
                 names that are hashed, prefixed, or include weight suffixes. Resolve them
                 to clean, human-readable names using the fontFaceRules / loadedFonts data
                 in Page Structure.
                 Resolution rules (apply in order):
                 a) Strip Next.js hashes: "__FontName_hash" → extract "FontName".
                 b) Strip weight/style suffixes: "FontName-Bold", "FontName-Regular",
                    "FontName-Light", "FontName-Medium", "FontName-Thin" → "FontName".
                 c) Insert spaces before uppercase letters in camelCase/PascalCase runs:
                    "NotoSansKR" → "Noto Sans KR", "SpoqaHanSansNeo" → "Spoqa Han Sans Neo".
                 d) Keep generic families (sans-serif, monospace, etc.) as-is when they are
                    the only family, but drop them when a named family precedes them.
                 e) If a font cannot be resolved, keep the original value unchanged.
              4. **Semantic naming with evidence**: Semantic token names (primary, surface, etc.) are allowed
                 ONLY when justified by usage context in the data. The most-used accent color on buttons/CTAs
                 → "primary". The dominant background color → "surface". If a role is ambiguous, use a
                 descriptive name instead (e.g., "dark-blue" rather than guessing "primary").
              5. **CSS custom properties**: If a CSS custom property name is present in the provided data,
                 include it as a YAML comment next to the corresponding token.
              6. **No domain speculation**: Do NOT infer industry, target audience, business model,
                 or design intent. Describe only observable visual properties.
                 OK: "The hero uses 64px bold type on a dark surface."
                 NOT OK: "Targeting tech-savvy professionals with a fintech aesthetic."
              7. **No generic advice**: Do NOT pad with universal design principles. Every statement
                 must be specific to this site's extracted data.
              8. **Output format**: Output ONLY the raw DESIGN.md content (starting with `---`).
                 No preamble, no wrapping code fences, no explanation.
          - role: user
            content: |
              Generate a complete DESIGN.md from the following website analysis data.
              Use ONLY the data below — do not invent or approximate any values.

              ${input.analysis @(description All extracted design data as a formatted string)}
      output: ${output.content as text}

  # ---------------------------------------------------------------------------
  # Browser tool workflows (tools for sub-agents)
  # ---------------------------------------------------------------------------

  - id: navigate-to-url
    #private: true
    name: navigate_to_url
    description: Navigate the browser to a URL and wait for the page to fully load including JavaScript rendering and web font loading.
    jobs:
      - component: browser
        action: navigate
        input:
          url: ${input.url @(description The full URL to navigate to, e.g. https://stripe.com)}
      - component: browser
        action: evaluate
        input:
          expression: >
            (async () => {
              await document.fonts.ready;
              return 'ready';
            })()
        output: ${output as text}

  - id: extract-page-structure
    #private: true
    name: extract_page_structure
    description: >
      Extract the overall page structure as a simplified outline: major sections, their tag names,
      class names, roles, and nesting depth. Returns a JSON array. Use this as the first inspection
      step to understand the page layout before drilling into specific elements.
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const SECTION_TAGS = ['header', 'nav', 'main', 'section', 'article', 'aside', 'footer', 'div'];
              const HEADING_SELECTOR = 'h1,h2,h3,h4';
              const MAX_DEPTH = 4;
              const MAX_SECTIONS = 50;
              const MAX_CLASSES = 3;
              const HEADING_PREVIEW_LENGTH = 80;

              const sections = [];

              function walk(el, depth) {
                if (depth > MAX_DEPTH) return;

                const tag = el.tagName.toLowerCase();
                const isSectionTag = SECTION_TAGS.includes(tag);
                const role = el.getAttribute('role');
                const id = el.id;
                const classes = (el.className && typeof el.className === 'string')
                  ? el.className.split(/\s+/).slice(0, MAX_CLASSES).join(' ')
                  : '';

                if (isSectionTag && (role || id || classes || depth < 2)) {
                  const heading = el.querySelector(HEADING_SELECTOR);
                  sections.push({
                    tag,
                    depth,
                    id: id || undefined,
                    classes: classes || undefined,
                    role: role || undefined,
                    heading: heading ? heading.textContent.trim().slice(0, HEADING_PREVIEW_LENGTH) : undefined,
                    childCount: el.children.length
                  });
                }

                for (const child of el.children) {
                  walk(child, depth + 1);
                }
              }

              walk(document.body, 0);
              return JSON.stringify(sections.slice(0, MAX_SECTIONS));
            })()
        output: ${output as json}

  - id: extract-page-html
    #private: true
    name: extract_page_html
    description: Extract the HTML markup of ALL matching elements on the page using a CSS selector. Returns a list of HTML strings. Useful for analyzing component structure, class names, and inline styles.
    jobs:
      - component: browser
        action: extract-html
        input:
          selector: ${input.selector @(description CSS selector to extract HTML from, e.g. "nav", "header", "footer", "head > link, head > style", "body")}
        output: ${output as json}

  - id: extract-css-custom-properties
    #private: true
    name: extract_css_custom_properties
    description: >
      Extract all CSS custom properties from the currently loaded page.
      Returns a JSON object grouped by CSS selector, with property names and values.
      Traverses all accessible stylesheets including nested @media, @layer, @supports rules.
      Cross-origin stylesheets that block access are silently skipped.
      Use skip_prefixes to exclude well-known framework/library variable prefixes
      (e.g., "--tw-" for Tailwind, "--toastify-" for react-toastify).
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const skipPrefixes = ${input.skip_prefixes @(description JSON array of CSS custom property prefixes to exclude, e.g. ["--tw-", "--toastify-", "--cc-"]. Use [] to extract everything without filtering.)};
              const result = {};

              function shouldSkip(name) {
                return skipPrefixes.some(prefix => name.startsWith(prefix));
              }

              function getAtRuleContext(rule) {
                if (rule instanceof CSSMediaRule) return '@media ' + rule.conditionText;
                if (rule instanceof CSSSupportsRule) return '@supports ' + rule.conditionText;
                return '@layer';
              }

              function isNestedGroupRule(rule) {
                return (
                  rule instanceof CSSMediaRule ||
                  rule instanceof CSSSupportsRule ||
                  (typeof CSSLayerBlockRule !== 'undefined' && rule instanceof CSSLayerBlockRule)
                );
              }

              function processRules(rules, parentContext) {
                for (const rule of rules) {
                  if (rule instanceof CSSStyleRule) {
                    const selector = parentContext
                      ? parentContext + ' ' + rule.selectorText
                      : rule.selectorText;

                    for (const prop of rule.style) {
                      if (!prop.startsWith('--') || shouldSkip(prop)) continue;
                      if (!result[selector]) result[selector] = {};
                      result[selector][prop] = rule.style.getPropertyValue(prop).trim();
                    }
                  } else if (isNestedGroupRule(rule)) {
                    const context = getAtRuleContext(rule);
                    const fullContext = parentContext ? parentContext + ' > ' + context : context;
                    processRules(rule.cssRules, fullContext);
                  }
                }
              }

              for (const sheet of document.styleSheets) {
                try {
                  processRules(sheet.cssRules, null);
                } catch (e) {
                  /* CORS: skip inaccessible sheet */
                }
              }

              return JSON.stringify(result);
            })()
        output: ${output as text}

  - id: extract-color-palette
    #private: true
    name: extract_color_palette
    description: >
      Extract all unique colors used on the page by scanning computed styles of all visible elements.
      Returns a JSON object with categorized colors: backgrounds, text colors, border colors, and
      shadows. Each entry includes the color value, usage frequency, and up to 3 representative
      elements. Results are sorted by frequency (most used first).
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const MAX_BACKGROUNDS = 20;
              const MAX_TEXT_COLORS = 20;
              const MAX_BORDER_COLORS = 15;
              const MAX_SHADOWS = 10;
              const SKIP_TAGS = new Set(['html', 'head', 'meta', 'link', 'script', 'style', 'title', 'br', 'hr', 'noscript', 'template']);

              function parseColor(raw) {
                if (!raw || raw === 'transparent' || raw === 'rgba(0, 0, 0, 0)') return null;
                const match = raw.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
                if (!match) return raw;
                const [, r, g, b, a] = match;
                const hex = '#' + [r, g, b].map(c => parseInt(c).toString(16).padStart(2, '0')).join('');
                const alpha = a !== undefined ? parseFloat(a) : 1;
                return alpha < 1 ? `rgba(${r}, ${g}, ${b}, ${alpha})` : hex;
              }

              function isVisible(el) {
                if (SKIP_TAGS.has(el.tagName.toLowerCase())) return false;
                if (!el.offsetParent && el.tagName.toLowerCase() !== 'body') return false;
                return true;
              }

              function describeEl(el) {
                const tag = el.tagName.toLowerCase();
                const cls = (el.className && typeof el.className === 'string')
                  ? '.' + el.className.split(/\s+/).slice(0, 2).join('.')
                  : '';
                const role = el.getAttribute('role');
                return tag + cls + (role ? '[' + role + ']' : '');
              }

              const bgMap = {};
              const textMap = {};
              const borderMap = {};
              const shadowMap = {};

              for (const el of document.querySelectorAll('*')) {
                if (!isVisible(el)) continue;
                const computed = getComputedStyle(el);
                const bg = parseColor(computed.backgroundColor);
                const text = parseColor(computed.color);
                const border = parseColor(computed.borderColor);
                const shadow = computed.boxShadow;
                const desc = describeEl(el);

                if (bg) {
                  if (!bgMap[bg]) bgMap[bg] = { value: bg, count: 0, elements: [] };
                  bgMap[bg].count++;
                  if (bgMap[bg].elements.length < 3) bgMap[bg].elements.push(desc);
                }
                if (text) {
                  if (!textMap[text]) textMap[text] = { value: text, count: 0, elements: [] };
                  textMap[text].count++;
                  if (textMap[text].elements.length < 3) textMap[text].elements.push(desc);
                }
                if (border && border !== bg) {
                  if (!borderMap[border]) borderMap[border] = { value: border, count: 0, elements: [] };
                  borderMap[border].count++;
                  if (borderMap[border].elements.length < 3) borderMap[border].elements.push(desc);
                }
                if (shadow && shadow !== 'none') {
                  if (!shadowMap[shadow]) shadowMap[shadow] = { value: shadow, count: 0, elements: [] };
                  shadowMap[shadow].count++;
                  if (shadowMap[shadow].elements.length < 3) shadowMap[shadow].elements.push(desc);
                }
              }

              const sortByCount = (obj, max) =>
                Object.values(obj).sort((a, b) => b.count - a.count).slice(0, max);

              return JSON.stringify({
                backgrounds: sortByCount(bgMap, MAX_BACKGROUNDS),
                textColors: sortByCount(textMap, MAX_TEXT_COLORS),
                borderColors: sortByCount(borderMap, MAX_BORDER_COLORS),
                shadows: sortByCount(shadowMap, MAX_SHADOWS)
              });
            })()
        output: ${output as json}

  - id: extract-font-sources
    #private: true
    name: extract_font_sources
    description: >
      Extract all font source declarations from the page: @font-face rules from all
      stylesheets (including inline style tags) and actually-loaded fonts via document.fonts
      API. Returns a JSON object with fontFaceRules (family, src URL, weight, style) and
      loadedFonts (family, weight, style, status). Use this to discover real font family
      names when computed styles show hashed or obfuscated values.
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (async () => {
              const SRC_PREVIEW_LENGTH = 300;
              const result = { fontFaceRules: [], loadedFonts: [] };

              function cleanFamily(name) {
                return name.replace(/['"]/g, '').trim();
              }

              for (const sheet of document.styleSheets) {
                try {
                  for (const rule of sheet.cssRules) {
                    if (rule instanceof CSSFontFaceRule) {
                      const style = rule.style;
                      result.fontFaceRules.push({
                        fontFamily: cleanFamily(style.getPropertyValue('font-family')),
                        src: style.getPropertyValue('src').slice(0, SRC_PREVIEW_LENGTH),
                        fontWeight: style.getPropertyValue('font-weight') || undefined,
                        fontStyle: style.getPropertyValue('font-style') || undefined
                      });
                    }
                  }
                } catch (e) {
                  /* CORS: skip inaccessible sheet */
                }
              }

              try {
                await document.fonts.ready;
                const seen = new Set();
                for (const font of document.fonts) {
                  const key = cleanFamily(font.family) + '|' + font.weight + '|' + font.style;
                  if (seen.has(key)) continue;
                  seen.add(key);
                  result.loadedFonts.push({
                    family: cleanFamily(font.family),
                    weight: font.weight,
                    style: font.style,
                    status: font.status
                  });
                }
              } catch (e) {
                /* fonts API unavailable */
              }

              return JSON.stringify(result);
            })()
        output: ${output as json}

  - id: extract-typography
    #private: true
    name: extract_typography
    description: >
      Extract all unique typography styles from the page by walking the DOM tree and
      finding every visible element that directly contains text. Uses TreeWalker instead
      of fixed CSS selectors, so it works with any markup (div-based, span-based, semantic).
      Returns a JSON array of unique font style combinations with element context
      and landmark location (header, nav, main, section, footer, etc.).
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const STYLE_KEYS = ['fontSize', 'fontWeight', 'lineHeight', 'letterSpacing', 'textTransform', 'color'];
              const LANDMARK_TAGS = new Set(['header', 'nav', 'main', 'section', 'article', 'aside', 'footer']);
              const SKIP_TAGS = new Set(['script', 'style', 'noscript', 'template', 'svg', 'path', 'iframe']);
              const WEIGHT_SUFFIXES = ['Thin', 'ExtraLight', 'UltraLight', 'Light', 'Regular', 'Medium', 'SemiBold', 'DemiBold', 'Bold', 'ExtraBold', 'UltraBold', 'Black', 'Heavy'];
              const GENERIC_FAMILIES = new Set(['serif', 'sans-serif', 'monospace', 'cursive', 'fantasy', 'system-ui', 'ui-monospace', 'ui-serif', 'ui-sans-serif', 'ui-rounded']);
              const MAX_RESULTS = 50;
              const TEXT_PREVIEW_LENGTH = 60;
              const MIN_TEXT_LENGTH = 2;

              function resolveFontFamily(rawFamily) {
                var first = rawFamily.split(',')[0].trim().replace(/['"]/g, '');
                if (GENERIC_FAMILIES.has(first)) return { family: first, variant: null };
                var clean = first.replace(/^__/, '').replace(/_[a-f0-9]{4,}$/i, '');
                var variant = null;
                for (var i = 0; i < WEIGHT_SUFFIXES.length; i++) {
                  var sfx = WEIGHT_SUFFIXES[i];
                  if (clean.length > sfx.length && clean.endsWith(sfx) && clean[clean.length - sfx.length - 1] === '-') {
                    variant = sfx.toLowerCase();
                    clean = clean.substring(0, clean.length - sfx.length - 1);
                    break;
                  }
                }
                var spaced = clean.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
                return { family: spaced, variant: variant };
              }

              function assignTierName(entry, usedNames) {
                var size = parseFloat(entry.fontSize) || 0;
                var isMono = GENERIC_FAMILIES.has(entry.fontFamily) || entry.fontFamily === 'ui-monospace';
                var base;
                if (isMono) { base = 'code'; }
                else if (size >= 48) { base = 'display'; }
                else if (size >= 32) { base = 'title'; }
                else if (size >= 20) { base = 'body'; }
                else if (size >= 14) { base = 'label'; }
                else { base = 'caption'; }
                var suffix = entry.fontVariant && entry.fontVariant !== 'regular' ? '-' + entry.fontVariant : '';
                var name = base + suffix;
                if (usedNames[name]) { name = base + '-' + Math.round(size) + (suffix || ''); }
                var counter = 2;
                var candidate = name;
                while (usedNames[candidate]) { candidate = name + '-' + counter; counter++; }
                usedNames[candidate] = true;
                return candidate;
              }

              function getLandmark(el) {
                let cur = el.parentElement;
                while (cur && cur !== document.body) {
                  if (LANDMARK_TAGS.has(cur.tagName.toLowerCase())) return cur.tagName.toLowerCase();
                  cur = cur.parentElement;
                }
                return 'body';
              }

              function hasDirectText(el) {
                for (const node of el.childNodes) {
                  if (node.nodeType === 3 && node.textContent.trim().length >= MIN_TEXT_LENGTH) return true;
                }
                return false;
              }

              function isHidden(el) {
                const s = getComputedStyle(el);
                return s.display === 'none' || s.visibility === 'hidden' || s.opacity === '0';
              }

              const seen = new Set();
              const entries = [];

              const walker = document.createTreeWalker(
                document.body,
                NodeFilter.SHOW_ELEMENT,
                {
                  acceptNode: function(el) {
                    const tag = el.tagName.toLowerCase();
                    if (SKIP_TAGS.has(tag)) return NodeFilter.FILTER_REJECT;
                    if (isHidden(el)) return NodeFilter.FILTER_REJECT;
                    if (hasDirectText(el)) return NodeFilter.FILTER_ACCEPT;
                    return NodeFilter.FILTER_SKIP;
                  }
                }
              );

              let el;
              while (el = walker.nextNode()) {
                const text = (el.textContent || '').trim();
                if (!text || text.length < MIN_TEXT_LENGTH) continue;

                const computed = getComputedStyle(el);
                const landmark = getLandmark(el);
                const resolved = resolveFontFamily(computed.fontFamily);
                const key = [resolved.family, computed.fontSize, computed.fontWeight, computed.lineHeight, computed.letterSpacing].join('|');
                if (seen.has(key)) continue;
                seen.add(key);

                const tag = el.tagName.toLowerCase();
                const entry = {
                  tag,
                  text: text.slice(0, TEXT_PREVIEW_LENGTH),
                  context: landmark,
                  fontFamily: resolved.family,
                  fontVariant: resolved.variant,
                  role: el.closest('[role]')?.getAttribute('role') || undefined
                };
                for (const prop of STYLE_KEYS) {
                  entry[prop] = computed[prop];
                }
                entries.push(entry);
              }

              var usedNames = {};
              var tiers = entries.slice(0, MAX_RESULTS).map(function(e) {
                e.tierName = assignTierName(e, usedNames);
                return e;
              });

              var yaml = tiers.map(function(t) {
                var lines = [
                  '  ' + t.tierName + ':',
                  '    fontFamily: "' + t.fontFamily + '"',
                  '    fontSize: "' + t.fontSize + '"',
                  '    fontWeight: ' + t.fontWeight,
                  '    lineHeight: "' + t.lineHeight + '"',
                  '    letterSpacing: "' + t.letterSpacing + '"'
                ];
                if (t.fontVariant && t.fontVariant !== 'regular') {
                  lines.push('    # variant: ' + t.fontVariant + ' | tag: ' + t.tag + ' | "' + t.text.slice(0, 30) + '"');
                } else {
                  lines.push('    # tag: ' + t.tag + ' | "' + t.text.slice(0, 30) + '"');
                }
                return lines.join('\n');
              }).join('\n');

              return 'typography:\n' + yaml;
            })()
        output: ${output as text}

  - id: extract-computed-styles
    #private: true
    name: extract_computed_styles
    description: >
      Extract computed CSS styles from elements matching a CSS selector.
      Returns a JSON array of objects, each containing the element's tag, text preview, and
      computed styles including colors, typography, box model, layout, and visual effects.
      Use this to get exact design token values.
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const STYLE_KEYS = [
                'color', 'backgroundColor', 'fontFamily', 'fontSize', 'fontWeight',
                'lineHeight', 'letterSpacing', 'borderRadius', 'padding', 'margin',
                'boxShadow', 'border', 'textTransform',
                'width', 'height', 'minHeight', 'maxWidth',
                'display', 'alignItems', 'justifyContent', 'gap',
                'opacity', 'backdropFilter'
              ];
              const MAX_ELEMENTS = 20;
              const TEXT_PREVIEW_LENGTH = 80;

              const selector = atob('${input.selector as base64}');

              let elements;
              try {
                elements = Array.from(document.querySelectorAll(selector));
              } catch (e) {
                return JSON.stringify([]);
              }

              const results = elements.slice(0, MAX_ELEMENTS).map(el => {
                const computed = getComputedStyle(el);
                const styles = {};
                for (const key of STYLE_KEYS) {
                  styles[key] = computed[key];
                }

                return {
                  tag: el.tagName.toLowerCase(),
                  text: (el.textContent || '').trim().slice(0, TEXT_PREVIEW_LENGTH),
                  classes: el.className,
                  styles
                };
              });

              return JSON.stringify(results);
            })()
        output: ${output as json}

  - id: extract-spacing-and-radii
    #private: true
    name: extract_spacing_and_radii
    description: >
      Extract unique spacing values (padding, margin, gap) and border-radius values used across the page.
      Returns a JSON object with sorted arrays of unique pixel values for spacing and radii.
    jobs:
      - component: browser
        action: evaluate
        input:
          expression: >
            (() => {
              const SPACING_PROPS = [
                'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft',
                'marginTop', 'marginRight', 'marginBottom', 'marginLeft', 'gap'
              ];
              const SKIP_VALUES = new Set(['0px', 'normal', '']);

              const spacings = new Set();
              const radii = new Set();

              function toNumber(s) {
                return parseFloat(s) || 0;
              }

              for (const el of document.querySelectorAll('*')) {
                const computed = getComputedStyle(el);

                for (const prop of SPACING_PROPS) {
                  const value = computed[prop];
                  if (value && !SKIP_VALUES.has(value)) {
                    spacings.add(value);
                  }
                }

                if (computed.borderRadius && computed.borderRadius !== '0px') {
                  radii.add(computed.borderRadius);
                }
              }

              return JSON.stringify({
                spacings: [...spacings].sort((a, b) => toNumber(a) - toNumber(b)),
                radii: [...radii].sort((a, b) => toNumber(a) - toNumber(b))
              });
            })()
        output: ${output as json}

  - id: scroll-page
    #private: true
    name: scroll_page
    description: Scroll the page by a specified number of pixels vertically. Use positive values to scroll down, negative to scroll up. Useful for revealing below-the-fold content before extracting styles from lazy-loaded sections.
    jobs:
      - component: browser
        action: scroll
        input:
          y: ${input.pixels @(description Number of pixels to scroll vertically. Positive = down, negative = up. Typical viewport height is 1080px.)}
        output: ${output as text}

components:
  - id: browser
    type: web-browser
    driver: chrome
    host: localhost
    port: 9222
    timeout: 60s
    max_concurrent_count: 1
    actions:
      - id: navigate
        method: navigate
        url: ${input.url}
        wait_until: load

      - id: extract-html
        method: extract
        selector: ${input.selector}
        extract_mode: html
        multiple: true

      - id: extract-text
        method: extract
        selector: ${input.selector}
        extract_mode: text
        multiple: false

      - id: evaluate
        method: evaluate
        expression: ${input.expression}

      - id: scroll
        method: scroll
        y: ${input.y}

  - id: gpt-4o
    type: http-client
    base_url: https://api.openai.com/v1
    action:
      path: /chat/completions
      method: POST
      headers:
        Authorization: Bearer ${env.OPENAI_API_KEY}
        Content-Type: application/json
        Accept-Encoding: gzip, deflate
      body:
        model: gpt-4o
        max_tokens: 16384
        messages: ${input.messages}
        tools: ${input.tools}
      output: ${response.choices[0].message}

  # ---------------------------------------------------------------------------
  # Agents
  # ---------------------------------------------------------------------------

  - id: component-inspector
    type: agent
    instructions: |
      You inspect specific UI components on a web page that is already loaded in the browser.

      # EXTRACTION STRATEGY

      For each component type, extract MULTIPLE variants and states:

      1. **Find all variants**: Don't stop at the first match. A button might have
         primary, secondary, ghost, and link variants. A card might have featured vs
         standard layouts. Use extract_page_html first to discover distinct class-based
         variants, then extract_computed_styles for each variant separately.

      2. **Capture dimensions**: For each component, include exact width, height,
         min-height, padding, and gap values. These are critical for reproduction.

      3. **Note hierarchy**: Record which components appear inside which sections
         (e.g., "CTA button inside hero" vs "nav button in header").

      4. **Scroll for more**: Use scroll_page to reveal below-the-fold content
         before extracting footer, pricing, or secondary sections.

      # STANDARD SELECTORS

      - Navigation: "nav", "header", "[role=navigation]"
      - Hero: "[class*=hero]", "section:first-of-type"
      - Buttons: "button", "a[class*=btn]", "[class*=button]", "[class*=cta]"
      - Cards: "[class*=card]", "[class*=tile]", "article"
      - Inputs: "input", "textarea", "select"
      - Badges/chips: "[class*=badge]", "[class*=tag]", "[class*=chip]"
      - Pricing: "[class*=price]", "[class*=plan]", "[class*=tier]"
      - Footer: "footer"

      # AVAILABLE STYLE PROPERTIES

      The extract_computed_styles tool returns these properties for each element:
      color, backgroundColor, fontFamily, fontSize, fontWeight,
      lineHeight, letterSpacing, borderRadius, padding, margin,
      boxShadow, border, textTransform,
      width, height, minHeight, maxWidth,
      display, alignItems, justifyContent, gap,
      opacity, backdropFilter

      Report ONLY values that the tool actually returned. Do NOT guess or fill in
      values that were not in the tool output.

      # OUTPUT FORMAT

      Return JSON grouped by component type, with sub-entries per variant.
      Each variant includes the raw "styles" object from the tool and "context"
      describing where on the page this variant appears.

      Do NOT generate a DESIGN.md — just return raw extracted data as JSON.
    model:
      component: gpt-4o
      input:
        messages: ${messages}
        tools: ${tools}
    tools:
      - extract-computed-styles
      - extract-page-html
      - scroll-page
    max_iteration_count: 15
    action:
      prompt: |
        ${input.instructions}

  # ---------------------------------------------------------------------------
  # CSS property extractor (sub-agent of design-analyzer)
  # ---------------------------------------------------------------------------

  - id: css-property-extractor
    type: agent
    instructions: |
      You extract CSS custom properties (design tokens) from a web page
      that is already loaded in the browser.

      You have ONE tool: extract_css_custom_properties.
      It accepts skip_prefixes — a JSON array of CSS variable prefixes to exclude.

      # WELL-KNOWN FRAMEWORK PREFIXES

      These are common framework/library prefixes that are NOT design tokens.
      Decide which to skip based on the site's likely stack:

      | Prefix         | Library / Framework         |
      |----------------|-----------------------------|
      | --tw-          | Tailwind CSS                |
      | --toastify-    | react-toastify              |
      | --cc-          | cookie consent (cookieconsent) |
      | --swiper-      | Swiper.js                   |
      | --slick-       | Slick carousel              |
      | --bs-          | Bootstrap                   |
      | --mdb-         | Material Design Bootstrap   |
      | --fc-          | FullCalendar                |
      | --plyr-        | Plyr media player           |
      | --rt-          | react-tooltip               |
      | --rdp-         | react-day-picker            |

      # STRATEGY

      1. Call extract_css_custom_properties with skip_prefixes: []
         to see ALL properties.
      2. Review the output. If it contains obvious framework noise,
         call again with appropriate skip_prefixes to get a clean result.
      3. Return the final JSON as a code block.

      If the first call already looks clean, just return it directly.

      # RULES

      - ALWAYS use extract_css_custom_properties — never write JavaScript yourself
      - Return the result as raw JSON — no code fences, no ```json markers
      - Do NOT summarize or omit data
      - If no custom properties are found, return {}
    model:
      component: gpt-4o
      input:
        messages: ${messages}
        tools: ${tools}
    tools:
      - extract-css-custom-properties
    max_iteration_count: 3
    action:
      prompt: |
        ${input.instructions}
