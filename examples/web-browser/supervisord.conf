[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log

[program:xvfb]
command=Xvfb :99 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx24
autorestart=true
priority=10

[program:chromium]
command=chromium-browser
    --no-sandbox
    --disable-gpu
    --disable-dev-shm-usage
    --remote-debugging-address=0.0.0.0
    --remote-debugging-port=9222
    --window-size=%(ENV_SCREEN_WIDTH)s,%(ENV_SCREEN_HEIGHT)s
    --start-maximized
    about:blank
autorestart=true
priority=20
environment=DISPLAY=":99"

[program:x11vnc]
command=x11vnc -display :99 -forever -shared -nopw -rfbport 5900
autorestart=true
priority=30

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=40

[program:socat-cdp]
command=socat TCP-LISTEN:9223,fork,reuseaddr TCP:127.0.0.1:9222
autorestart=true
priority=50
