# Chromium + Xvfb + noVNC infrastructure for web-browser component
#
# This provides:
#   - Chromium with CDP remote debugging on port 9222
#   - Virtual display via Xvfb
#   - VNC server (x11vnc) on port 5900
#   - noVNC web client on port 6080
#
# Usage:
#   docker compose up -d
#   # Then access noVNC at http://localhost:6080/vnc.html
#   # The web-browser component connects via CDP at localhost:9222

services:
  chromium:
    image: zenika/alpine-chrome:latest
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --window-size=1920,1080
    ports:
      - "9222:9222"
    shm_size: "2gb"
    networks:
      - browser-net

  # noVNC provides browser-based VNC access for human fallback
  # Uses a Chromium-based image with built-in VNC + noVNC
  novnc:
    image: theasp/novnc:latest
    environment:
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - RUN_XTERM=no
    ports:
      - "6080:8080"
    networks:
      - browser-net

networks:
  browser-net:
    driver: bridge
