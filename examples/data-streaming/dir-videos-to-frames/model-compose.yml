controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflows:
  # Top-level workflow: list videos in a directory, then dispatch one
  # sub-workflow run per video to extract and save its frames.
  - id: process-directory
    title: Directory → Videos → Frames → Local Files
    description: |
      List every video in ./input/videos and, for each one, stream its
      frames through the extractor and save them under ./output/frames.
    jobs:
      # List the videos in the source directory. `list` returns a dict
      # with an `items` array whose entries expose `path`, `url`, `size`,
      # `content_type`, and `modified_at`.
      - id: list-videos
        component: source-store
        # Forward just the items array so the next job can iterate over
        # per-video dicts directly.
        output: ${output.items}

      # Iterate over the video items and run the per-video sub-workflow
      # once for each. Inside `do`, `${item}` refers to one list entry.
      - id: process-videos
        type: for-each
        input: ${jobs.list-videos.output}
        do:
          component: per-video-runner
          input:
            # Pass the video's `file://` URL so the sub-workflow can load
            # it as a raw video stream, plus its relative path so frames
            # can be grouped by source video in the output directory.
            video_url: ${item.url}
            video_path: ${item.path}
        depends_on: [ list-videos ]

  # Sub-workflow: takes a single video, extracts its frames as a stream,
  # and writes each frame to a per-video subdirectory on disk. Mirrors
  # the single-video example in ../video-to-frames/.
  - id: process-one-video
    title: Video → Frames → Local Files (per video)
    private: true
    jobs:
      - id: extract-frames
        component: frame-extractor
        input:
          # `;url` tells the renderer to fetch the string as a URL (here a
          # `file://` URL from the file-store list) and hand the extractor
          # a raw video stream.
          video: ${input.video_url as video;url}
          frame_interval: 30

      - id: save-frames
        type: for-each
        input: ${jobs.extract-frames.output}
        do:
          component: storage
          input:
            # Group frames by the source video's relative path so runs
            # across multiple videos don't collide in the output tree.
            path: ${input.video_path}/frame-${item.timestamp}.png
            source: ${item.image as image/png}
        depends_on: [ extract-frames ]

components:
  # Reads the input directory and lists matching video files.
  - id: source-store
    type: file-store
    driver: local
    base_path: ./input/videos
    action:
      method: list
      pattern: "*.mov"

  # Invokes the per-video sub-workflow from the top-level for-each.
  - id: per-video-runner
    type: workflow
    action:
      workflow: process-one-video
      input:
        video_url: ${input.video_url}
        video_path: ${input.video_path}

  # Extracts frames from a video using ffmpeg.
  # `streaming: true` makes the action yield frames as they are decoded
  # so the following for-each can save them incrementally.
  - id: frame-extractor
    type: video-frame-extractor
    driver: ffmpeg
    action:
      video: ${input.video}
      frame_interval: ${input.frame_interval}
      streaming: true

  # Writes a single file to the local output directory.
  - id: storage
    type: file-store
    driver: local
    base_path: ./output/frames
    action:
      method: put
      path: ${input.path}
      source: ${input.source}
    output: ${result.path}
