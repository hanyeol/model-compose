controller:
  adapter:
    type: http-server
    port: 8083
    base_path: /api
  webui:
    driver: gradio
    port: 8084

workflow:
  title: Text to Speech with Voice Cloning
  description: Clone a voice from reference audio and generate speech using Qwen3-TTS.
  job:
    input: ${input}
    output: ${output}

component:
  type: model
  task: text-to-speech
  driver: custom
  family: qwen
  model: Qwen/Qwen3-TTS-12Hz-1.7B-Base
  device: cpu
  max_concurrent_count: 1
  action:
    method: clone
    text: ${input.text as text}
    reference_audio: ${input.reference_audio as audio}
    reference_text: ${input.reference_text as text}
    output: ${result as audio/wav}
