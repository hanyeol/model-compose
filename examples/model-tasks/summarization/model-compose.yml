controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflow:
  title: Summarize Text
  description: Generate a concise and informative summary from a longer input text using a pretrained seq2seq model.
  job:
    input: ${input}
    output:
      summary: ${output}

component:
  type: model
  task: text-to-text
  driver: huggingface
  architecture: bart
  model: facebook/bart-large-cnn
  max_concurrent_count: 1
  action:
    text: ${input.text as text}
    max_input_length: 1024
    params:
      do_sample: false
