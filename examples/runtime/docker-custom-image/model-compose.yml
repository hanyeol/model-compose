controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflow:
  title: Docker Runtime (custom image)
  description: |
    Runs nginx:alpine as the component's runtime. Since `image:` is set,
    model-compose classifies this as a CUSTOM image — no build, no derived
    layer, and IPC bootstrapping is skipped because the component talks HTTP.
  job:
    input: ${input}
    output:
      body: ${response as text}

component:
  type: http-server
  runtime:
    type: docker
    image: nginx:alpine
    container_name: runtime-nginx
    ports:
      - "8090:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped
  port: 8090
  action:
    method: GET
    path: /${input.path | index.html}
