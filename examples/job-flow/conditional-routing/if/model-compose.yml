controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflow:
  title: Conditional Routing with `if` Job
  description: |
    Routes the workflow to a different job based on the numeric `score` value
    in the input. Demonstrates the `if` job type with multiple conditions and
    an `otherwise` fallback.
  jobs:
    - id: classify-score
      type: if
      input: ${input.score as integer @(description Test score from 0 to 100)}
      conditions:
        - operator: gte
          value: 90
          if_true: grade-a
        - operator: gte
          value: 70
          if_true: grade-b
      otherwise: grade-f

    - id: grade-a
      component: format-result
      input:
        score: ${input.score as integer}
        grade: A
        message: Excellent work!
      output: ${output}

    - id: grade-b
      component: format-result
      input:
        score: ${input.score as integer}
        grade: B
        message: Good job, keep it up.
      output: ${output}

    - id: grade-f
      component: format-result
      input:
        score: ${input.score as integer}
        grade: F
        message: Needs improvement.
      output: ${output}

components:
  - id: format-result
    type: shell
    action:
      command: [ "echo", "[Grade ${input.grade}] score=${input.score} - ${input.message}" ]
      output:
        grade: ${input.grade}
        score: ${input.score}
        message: ${input.message}
        rendered: ${result.stdout}
