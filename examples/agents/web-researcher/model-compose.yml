controller:
  type: http-server
  port: 8080
  base_path: /api
  webui:
    driver: gradio
    port: 8081

workflows:
  - id: main
    title: Web Researcher Agent
    description: An autonomous agent that searches the web and fetches pages to research a topic and provide a comprehensive answer.
    component: research-agent
    input:
      question: ${input.question as text}
    output:
      answer: ${output[-1].content as markdown}
      messages: ${output as json}

  - id: search-web
    private: true
    name: search_web
    description: Search the web for information on a given query. Returns a list of relevant results with titles, URLs, and snippets.
    jobs:
      - component: tavily
        input:
          query: ${input.query @(description The search query string)}
          max_results: ${input.max_results as integer | 5 @(description Maximum number of search results to return)}
        output: ${output as json}

  - id: fetch-page
    private: true
    name: fetch_page
    description: Fetch and extract the text content from a web page URL.
    jobs:
      - component: scraper
        input:
          url: ${input.url @(description The URL of the web page to fetch)}
        output: ${output as text}

components:
  - id: research-agent
    type: agent
    tools:
      - search-web
      - fetch-page
    max_iteration_count: 10
    action:
      model:
        component: gpt-4o
        input:
          messages: ${messages}
          tools: ${tools}
      system_prompt: You are a web research assistant. Search the web and fetch pages to thoroughly research the given topic, then provide a comprehensive, well-organized answer.
      user_prompt: ${input.question}

  - id: gpt-4o
    type: http-client
    base_url: https://api.openai.com/v1
    action:
      path: /chat/completions
      method: POST
      headers:
        Authorization: Bearer ${env.OPENAI_API_KEY}
        Content-Type: application/json
      body:
        model: gpt-4o
        messages: ${input.messages}
        tools: ${input.tools}
      output: ${response.choices[0].message}

  - id: tavily
    type: http-client
    action:
      endpoint: https://api.tavily.com/search
      method: POST
      headers:
        Content-Type: application/json
      body:
        api_key: ${env.TAVILY_API_KEY}
        query: ${input.query}
        max_results: ${input.max_results}
      output: ${response.results}

  - id: scraper
    type: web-scraper
    action:
      url: ${input.url}
      selector: body
      extract_mode: text
      output: ${result}
