controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflows:
  - id: extract
    title: Audio Extractor
    description: Extract audio from a video or audio file using ffmpeg
    job:
      component: extractor
      input:
        source: ${input.source as file}
        format: ${input.format as select/mp3,wav,flac,aac,m4a,opus,ogg | mp3}
        codec: ${input.codec as select/libmp3lame,pcm_s16le,flac,aac,libopus,libvorbis,copy | libmp3lame}
        bitrate: ${input.bitrate as select/64k,128k,192k,256k,320k | 192k}
        track: ${input.track as select/0,1,2,3 | 0}
      output:
        audio: ${output.path as audio;path}

components:
  - id: extractor
    type: audio-extractor
    action:
      source: ${input.source}
      format: ${input.format}
      codec: ${input.codec}
      bitrate: ${input.bitrate}
      track: ${input.track}
