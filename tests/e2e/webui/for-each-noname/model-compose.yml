controller:
  adapter:
    type: http-server
    port: 8080
    base_path: /api
  webui:
    driver: gradio
    port: 8081

workflow:
  title: For-Each (No Group Name)
  description: |
    A terminal `for-each` job iterates over a list of names.
    The web UI renders the output as an unbounded variable group
    (one accordion per item, empty label).
  jobs:
    - id: greet-each
      type: for-each
      input: ${input.names as list | ["alice","bob","carol"]}
      do:
        component: greeter
        input:
          name: ${item}

components:
  - id: greeter
    type: shell
    action:
      command: [ "bash", "-c", "printf '{\"message\": \"Hello, %s!\"}\\n' '${input.name}'" ]
      output: ${result.stdout as json}
